<!DOCTYPE html>
<html lang="zh-CN" class="dark" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAS · 智能协作平台</title>
  <meta name="description" content="多智能体协作系统 - Multi-Agent System" />
  <meta name="theme-color" content="#0a0a14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #e2e2f0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }
    #app { min-height: 100vh; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(108,92,231,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(108,92,231,0.4); }
    ::selection { background: rgba(108,92,231,0.35); color: #fff; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 15% 25%, rgba(108,92,231,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 45% 40% at 85% 75%, rgba(74,222,128,0.03) 0%, transparent 55%),
        radial-gradient(ellipse 35% 45% at 50% 5%, rgba(251,146,60,0.025) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.012;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    .glass { background: rgba(20,20,42,0.55); backdrop-filter: blur(20px) saturate(1.3); -webkit-backdrop-filter: blur(20px) saturate(1.3); border: 1px solid rgba(108,92,231,0.08); }
    .glass-strong { background: rgba(26,26,52,0.75); backdrop-filter: blur(28px) saturate(1.4); -webkit-backdrop-filter: blur(28px) saturate(1.4); border: 1px solid rgba(108,92,231,0.1); }
    .card-hover { transition: all 0.25s cubic-bezier(0.16,1,0.3,1); }
    .card-hover:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(108,92,231,0.1); border-color: rgba(108,92,231,0.2); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="portal-target"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
