    <!-- 代码 -->
    <g font-family="'Consolas','Courier New',monospace" font-size="7" opacity="0.6">
      <text x="294" y="162" fill="#58a6ff">import</text>
      <text x="318" y="162" fill="#79c0ff"> { Agent } </text>
      <text x="358" y="162" fill="#58a6ff">from</text>
      <text x="378" y="162" fill="#a5d6ff">"./agent"</text>
      <text x="294" y="174" fill="#58a6ff">import</text>
      <text x="318" y="174" fill="#79c0ff"> { Tool } </text>
      <text x="358" y="174" fill="#58a6ff">from</text>
      <text x="378" y="174" fill="#a5d6ff">"./tools"</text>
      <text x="280" y="190" fill="#ff7b72">const</text>
      <text x="306" y="190" fill="#79c0ff">agent</text>
      <text x="330" y="190" fill="#ff7b72">=</text>
      <text x="342" y="190" fill="#79c0ff">new</text>
      <text x="366" y="190" fill="#d2a8ff">Agent</text>
      <text x="294" y="202" fill="#79c0ff">  model:</text>
      <text x="334" y="202" fill="#a5d6ff">"gpt-4"</text>
      <text x="294" y="214" fill="#79c0ff">  tools: [</text>
      <text x="306" y="226" fill="#79c0ff">    webSearch,</text>
      <text x="306" y="238" fill="#79c0ff">    codeRunner,</text>
      <text x="306" y="250" fill="#79c0ff">    fileSystem,</text>
      <text x="294" y="262" fill="#79c0ff">  ]</text>
      <text x="280" y="278" fill="#7ee787">agent</text>
      <text x="310" y="278" fill="#ff7b72">.</text>
      <text x="316" y="278" fill="#d2a8ff">run</text>
      <text x="340" y="278" fill="#a5d6ff">(</text>
    </g>
    <!-- 光标 -->
